<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>StyleShop</title>

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

 <link rel="stylesheet" href="styleshop.css">
</head>
<body>

  <header>
    <h1>StyleShop</h1>

    <div class="header-extra">
      🛒
      <span class="cart-count">3</span>
    </div>
  </header>

  <main>

    <aside>
      <h2>Estilos</h2>
    </aside>

    <section class="productos">

      <!-- BUSCADOR -->
      <div class="buscador">
        🔎
        <input type="text" placeholder="Buscar productos...">
      </div>

      <!-- CAMISETAS -->
      <div class="producto">
        <strong>👕 Camisetas</strong>

        <details class="dropdown">
          <summary>Ver</summary>
          <ul>
            <li>Manga corta</li>
            <li>Manga larga</li>
          </ul>
        </details>

        <span class="stock">Stock</span>
      </div>

      <!-- SUDADERAS -->
      <div class="producto">
        <strong>🧥 Sudaderas</strong>

        <details class="dropdown">
          <summary>Ver</summary>
          <ul>
            <li>Con cierre</li>
            <li>Sin cierre</li>
          </ul>
        </details>

        <span class="stock">Stock</span>
      </div>

      <!-- PANTALONES -->
      <div class="producto">
        <strong>👖 Pantalones</strong>

        <details class="dropdown">
          <summary>Ver</summary>
          <ul>
            <li>Cortos</li>
            <li>Largos</li>
          </ul>
        </details>

        <span class="stock">Stock</span>
      </div>

      <!-- ZAPATILLAS -->
      <div class="producto">
        <strong>👟 Zapatillas</strong>

        <details class="dropdown">
          <summary>Ver</summary>
          <ul>
            <li>Elegantes</li>
            <li>Deportivas</li>
          </ul>
        </details>

        <span class="stock">Stock</span>
      </div>

    </section>

  </main>

</body>
</html>
