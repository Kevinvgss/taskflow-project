<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>TaskNova Planner</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: 'class'
}
</script>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body class="bg-slate-100 dark:bg-slate-900 font-[Inter] transition-colors duration-300">

<header class="flex justify-between items-center px-10 py-5 bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-md">

<div class="logo">🚀 TaskNova Planner</div>

<div class="flex items-center gap-4">

<div id="today-date"></div>

<button id="dark-toggle"
class="px-4 py-1 rounded-full bg-white/20 hover:bg-white/30 transition text-sm">
🌙 Modo oscuro
</button>

</div>

</header>


<main class="grid grid-cols-1 md:grid-cols-[220px_1fr] xl:grid-cols-[240px_1fr_260px] gap-6 p-4 md:p-6">


<!-- SIDEBAR -->

<aside class="sidebar bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-lg order-2 md:order-none">

<h3 class="section-title">Panel</h3>

<button class="menu active" data-filter="all">📋 Todas</button>
<button class="menu" data-filter="personal">👤 Personal</button>
<button class="menu" data-filter="trabajo">💼 Trabajo</button>
<button class="menu" data-filter="hogar">🏠 Hogar</button>
<button class="menu" data-filter="salud">💪 Salud</button>


<div class="calendar-card">

<h4 class="section-title">Calendario</h4>

<div id="calendar-header"></div>

<div class="calendar-days">
<span>L</span>
<span>M</span>
<span>X</span>
<span>J</span>
<span>V</span>
<span>S</span>
<span>D</span>
</div>

<div id="calendar"></div>

</div>


<button id="clear-all" class="clear-btn">
🗑 Eliminar todas las tareas
</button>


</aside>



<!-- CONTENIDO CENTRAL -->

<section class="main bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-lg">

<div class="stats">

<div class="stat">
<p>Total tareas</p>
<span id="total-count">0</span>
</div>

<div class="stat">
<p>Completadas</p>
<span id="completed-count">0</span>
</div>

<div class="stat">
<p>Pendientes</p>
<span id="pending-count">0</span>
</div>

</div>


<div class="progress-container">

<p>Progreso del día</p>

<div class="progress-bar">
<div id="progress-fill"></div>
</div>

<span id="progress-text">0%</span>

</div>



<div class="creator flex flex-wrap gap-2 items-center">

<input id="task-input" placeholder="Escribe una tarea...">

<select id="task-category">

<option value="personal">👤 Personal</option>
<option value="trabajo">💼 Trabajo</option>
<option value="hogar">🏠 Hogar</option>
<option value="salud">💪 Salud</option>

</select>

<select id="task-priority">

<option value="alta">Alta prioridad</option>
<option value="media">Media prioridad</option>
<option value="baja">Baja prioridad</option>

</select>

<input type="time" id="task-time">

<textarea id="task-notes" placeholder="Notas..."></textarea>

<button id="add-task" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
Añadir tarea
</button>

</div>



<div class="search-box">

<input id="search-task" placeholder="🔎 Buscar tarea...">

</div>



<h2 class="section-title">Mis tareas</h2>

<div id="task-list"></div>

<p id="empty-message">📭 No tienes tareas todavía. ¡Añade una para empezar!</p>

</section>



<!-- PANEL DERECHO -->

<aside class="right-panel bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-lg order-3">

<h3 class="section-title">Recordatorios</h3>

<div class="reminder-creator">

<input id="reminder-input" placeholder="Nuevo recordatorio...">

<button id="add-reminder">Añadir</button>

</div>

<div id="reminder-list"></div>

</aside>


</main>

<script src="app.js"></script>

</body>
</html>
